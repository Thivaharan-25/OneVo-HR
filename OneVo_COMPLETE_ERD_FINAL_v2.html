<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONEVO — Complete Interactive ERD | 151 Tables</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#080c16;color:#e8ecf4;line-height:1.5}

.app{display:flex;height:100vh;flex-direction:column}

/* TOPBAR */
.topbar{height:52px;background:linear-gradient(135deg,#0c1225 0%,#1a1540 50%,#0c1225 100%);border-bottom:1px solid #1c2847;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:300}
.topbar h1{font-size:17px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.topbar-divider{width:1px;height:26px;background:#1c2847}
.topbar-stats{display:flex;gap:6px;flex-wrap:nowrap}
.topbar-chip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:14px;letter-spacing:0.3px;white-space:nowrap;border:1px solid}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.topbar-btn{background:rgba(255,255,255,0.06);border:1px solid #1c2847;color:#8b9dc3;padding:5px 12px;border-radius:8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.topbar-btn:hover{background:rgba(255,255,255,0.1);color:#e8ecf4}
.topbar-btn kbd{font-size:9px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-family:inherit}

/* MAIN LAYOUT */
.main-area{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:240px;background:#0b1020;border-right:1px solid #1c2847;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:200;transition:width .25s}
.sidebar.collapsed{width:0;border:none}
.sidebar-header{padding:12px 14px 8px;border-bottom:1px solid #1c2847;display:flex;justify-content:space-between;align-items:center}
.sidebar-header h2{font-size:12px;font-weight:700;color:#8b9dc3;text-transform:uppercase;letter-spacing:0.5px}
.sidebar-count{font-size:10px;color:#566a8f;font-weight:600}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 8px}
.sidebar-scroll::-webkit-scrollbar{width:4px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:#1c2847;border-radius:4px}
.sidebar-module{margin-bottom:4px}
.sidebar-module-header{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;transition:background .15s}
.sidebar-module-header:hover{background:rgba(255,255,255,0.04)}
.sidebar-module-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-module-count{margin-left:auto;font-size:9px;color:#566a8f;font-weight:600}
.sidebar-module-chevron{font-size:8px;color:#566a8f;transition:transform .2s}
.sidebar-module-chevron.open{transform:rotate(90deg)}
.sidebar-table-list{padding:0 0 0 22px}
.sidebar-table-item{font-size:11px;color:#8b9dc3;padding:3px 8px;border-radius:5px;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-table-item:hover{background:rgba(255,255,255,0.05);color:#e8ecf4}
.sidebar-table-item.active{background:rgba(129,140,248,0.15);color:#818cf8}

/* FILTER BAR */
.filter-bar{height:40px;background:#0a0f1e;border-bottom:1px solid #1c2847;display:flex;align-items:center;padding:0 16px;gap:6px;overflow-x:auto;flex-shrink:0}
.filter-bar::-webkit-scrollbar{height:3px}
.filter-bar::-webkit-scrollbar-thumb{background:#1c2847;border-radius:3px}
.filter-pill{font-size:10px;font-weight:600;padding:4px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:all .2s;display:flex;align-items:center;gap:4px}
.filter-pill .dot{width:6px;height:6px;border-radius:50%}
.filter-pill.inactive{background:rgba(255,255,255,0.04);color:#566a8f}
.filter-pill.inactive:hover{color:#8b9dc3;background:rgba(255,255,255,0.07)}

/* CANVAS */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#080c16}
.canvas{position:absolute;top:0;left:0;transform-origin:0 0}
.canvas svg.lines{position:absolute;top:0;left:0;pointer-events:none;z-index:1}

/* ENTITY CARDS */
.entity{position:absolute;width:240px;background:#0f1628;border:1px solid #1c2847;border-radius:10px;cursor:grab;z-index:10;transition:box-shadow .2s,opacity .25s,border-color .2s;user-select:none}
.entity:hover{z-index:50}
.entity.dragging{cursor:grabbing;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.entity.dimmed{opacity:0.12;pointer-events:none}
.entity.highlighted{z-index:80}
.entity-header{padding:8px 10px 6px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:8px;cursor:grab}
.entity-header .icon-box{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.entity-header .name{font-size:12px;font-weight:700;color:#e8ecf4;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entity-header .module-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:0.3px;white-space:nowrap;flex-shrink:0}
.entity-cols{padding:4px 0;max-height:140px;overflow:hidden}
.entity-col{display:flex;align-items:center;gap:4px;padding:2px 10px;font-size:10px;color:#8b9dc3}
.entity-col .col-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entity-col .col-tag{font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;letter-spacing:0.3px}
.tag-pk{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.tag-fk{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.3)}
.tag-enc{background:rgba(244,114,182,0.15);color:#f472b6;border:1px solid rgba(244,114,182,0.3)}
.tag-json{background:rgba(45,212,191,0.12);color:#2dd4bf;border:1px solid rgba(45,212,191,0.25)}
.entity-more{padding:2px 10px 4px;font-size:9px;color:#566a8f;font-weight:600}
.entity-footer{padding:5px 10px;border-top:1px solid #1c2847;display:flex;justify-content:space-between;align-items:center;font-size:9px;border-radius:0 0 10px 10px}
.entity-footer .mod{font-weight:600}
.entity-footer .rels{color:#566a8f}

/* DETAIL PANEL */
.detail-overlay{position:fixed;inset:0;z-index:400;display:none}
.detail-overlay.open{display:flex}
.detail-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
.detail-panel{position:absolute;right:0;top:0;bottom:0;width:420px;background:#0c1225;border-left:1px solid #1c2847;overflow-y:auto;z-index:1;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-thumb{background:#1c2847;border-radius:5px}
.detail-head{padding:18px 20px 14px;border-bottom:1px solid #1c2847}
.detail-head h2{font-size:16px;font-weight:800;margin-bottom:2px}
.detail-head .mod-label{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;display:inline-block}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#566a8f;font-size:18px;cursor:pointer;padding:4px}
.detail-close:hover{color:#e8ecf4}
.detail-section{padding:14px 20px}
.detail-section h3{font-size:11px;font-weight:700;color:#566a8f;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.detail-col-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;border-bottom:1px solid #0f1628}
.detail-col-row .dcol-name{font-weight:600;color:#e8ecf4;min-width:120px}
.detail-col-row .dcol-type{color:#566a8f;font-size:10px;flex:1}
.detail-col-row .dcol-tags{display:flex;gap:3px}
.detail-rel-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .15s;font-size:11px}
.detail-rel-item:hover{background:rgba(255,255,255,0.05)}
.detail-rel-item .arrow{color:#566a8f;font-size:10px}

/* SEARCH MODAL */
.search-overlay{position:fixed;inset:0;z-index:500;display:none;justify-content:center;padding-top:80px}
.search-overlay.open{display:flex}
.search-overlay .backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px)}
.search-box{position:relative;width:500px;max-height:500px;background:#0f1628;border:1px solid #1c2847;border-radius:14px;overflow:hidden;z-index:1;display:flex;flex-direction:column;animation:fadeScale .15s ease}
@keyframes fadeScale{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.search-input-wrap{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #1c2847;gap:8px}
.search-input-wrap svg{color:#566a8f;flex-shrink:0}
.search-input{flex:1;background:none;border:none;color:#e8ecf4;font-size:14px;outline:none;font-family:inherit}
.search-input::placeholder{color:#3a4a6b}
.search-results{overflow-y:auto;padding:6px}
.search-results::-webkit-scrollbar{width:4px}
.search-results::-webkit-scrollbar-thumb{background:#1c2847;border-radius:4px}
.search-result-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .15s}
.search-result-item:hover,.search-result-item.selected{background:rgba(129,140,248,0.1)}
.search-result-item .sr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.search-result-item .sr-name{font-size:12px;font-weight:600}
.search-result-item .sr-meta{font-size:10px;color:#566a8f;margin-left:auto}
.search-empty{padding:24px;text-align:center;color:#566a8f;font-size:12px}

/* MINIMAP */
.minimap{position:absolute;bottom:12px;right:12px;width:180px;height:120px;background:rgba(11,16,32,0.9);border:1px solid #1c2847;border-radius:8px;z-index:100;overflow:hidden}
.minimap canvas{width:100%;height:100%}

/* TOOLBAR */
.toolbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(11,16,32,0.92);border:1px solid #1c2847;border-radius:10px;padding:4px;z-index:100}
.toolbar button{background:rgba(255,255,255,0.05);border:1px solid transparent;color:#8b9dc3;padding:5px 10px;border-radius:6px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;font-family:inherit;font-weight:600}
.toolbar button:hover{background:rgba(255,255,255,0.1);color:#e8ecf4}
.toolbar button kbd{font-size:8px;opacity:0.5}

/* ZOOM INDICATOR */
.zoom-ind{position:absolute;top:8px;right:12px;font-size:10px;color:#566a8f;z-index:100;background:rgba(11,16,32,0.8);padding:3px 8px;border-radius:6px}

/* SCROLLBARS */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1c2847;border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>ONEVO ERD</h1>
    <div class="topbar-divider"></div>

      <span class="topbar-chip" style="background:rgba(129,140,248,0.12);color:#818cf8;border-color:rgba(129,140,248,0.3)">151 Tables</span>

      <button class="topbar-btn" onclick="toggleSidebar()">

      </button>
    </div>
  </div>

  <div class="main-area">

    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">

</div>

<div class="detail-overlay" id="detailOverlay">

</div>

<!-- SEARCH -->
<div class="search-overlay" id="searchOverlay">
  <div class="backdrop" onclick="closeSearch()"></div>
  <div class="search-box">
    <div class="search-input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="Search tables or columns..." autocomplete="off">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

// ===== BUILD RELATIONSHIP MAP =====
const tableByName = {};
TABLES.forEach(t => tableByName[t.name] = t);

// Build relationships from FK columns
const relationships = []; // {from: tableName, to: tableName, fromCol, toCol}
TABLES.forEach(t => {
  t.cols.forEach(c => {
    if (c.fk) {
      relationships.push({from: t.name, to: c.fk, fromCol: c.n, toCol: 'id'});
    }
  });
});

// For each table, how many relationships it has
function getRelCount(tName) {
  return relationships.filter(r => r.from === tName || r.to === tName).length;
}

// Get connected table names
function getConnected(tName) {
  const s = new Set();
  relationships.forEach(r => {
    if (r.from === tName) s.add(r.to);
    if (r.to === tName) s.add(r.from);
  });
  return s;
}

function assignPositions() {
  const moduleCounters = {};
  TABLES.forEach(t => {
    const mp = MODULE_POSITIONS[t.module] || {x:0,y:0};
    if (!moduleCounters[t.module]) moduleCounters[t.module] = 0;
    const idx = moduleCounters[t.module]++;
    const cols = Math.min(4, Math.ceil(Math.sqrt(MODULES.find(m=>m.key===t.module)?.count||4)));
    const row = Math.floor(idx / cols);
    const col = idx % cols;
    t.x = mp.x + col * 270;
    t.y = mp.y + row * 260;
  });
}
assignPositions();

let dragging = null;
let dragOffX = 0, dragOffY = 0;

let panStartPanX = 0, panStartPanY = 0;
let selectedTable = null;

MODULES.forEach(m => sidebarModulesOpen[m.key] = true);

const canvasEl = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvasWrap');
const svgLines = document.getElementById('svgLines');

// ===== RENDER ENTITIES =====
const entityEls = {};
function renderEntities() {
  canvasEl.innerHTML = '';
  TABLES.forEach(t => {
    const mod = MODULES.find(m => m.key === t.module);
    const color = mod ? mod.color : '#666';
    const relCount = getRelCount(t.name);
    const maxShow = 6;
    const visibleCols = t.cols.slice(0, maxShow);
    const extraCols = t.cols.length - maxShow;

    const el = document.createElement('div');
    el.className = 'entity';
    el.dataset.table = t.name;
    el.dataset.module = t.module;
    el.style.left = t.x + 'px';
    el.style.top = t.y + 'px';
    el.style.borderColor = color + '40';

    let colsHtml = visibleCols.map(c => {
      let tags = '';
      if (c.pk) tags += '<span class="col-tag tag-pk">PK</span>';
      if (c.fk) tags += '<span class="col-tag tag-fk">FK</span>';
      if (c.enc) tags += '<span class="col-tag tag-enc">ENC</span>';
      if (c.json) tags += '<span class="col-tag tag-json">JSON</span>';
      return `<div class="entity-col"><span class="col-name">${c.n}</span>${tags}</div>`;
    }).join('');

    el.innerHTML = `
      <div class="entity-header" style="background:linear-gradient(135deg,${color}18,${color}08)">
        <div class="icon-box" style="background:${color}">${t.name.charAt(0).toUpperCase()}</div>
        <span class="name">${t.name}</span>
        <span class="module-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${(mod?.label||'').split(' ')[0]}</span>
      </div>
      <div class="entity-cols">${colsHtml}</div>
      ${extraCols > 0 ? `<div class="entity-more">+ ${extraCols} more columns</div>` : ''}
      <div class="entity-footer" style="background:${color}08">
        <span class="mod" style="color:${color}">${mod?.label||t.module}</span>
        <span class="rels">${relCount} rel${relCount!==1?'s':''}</span>
      </div>
    `;

    // Click to select
    el.addEventListener('click', (e) => {
      if (el.classList.contains('dragging')) return;
      e.stopPropagation();
      selectTable(t.name);
    });

    // Double-click opens detail
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      openDetail(t.name);
    });

    // Drag
    el.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.stopPropagation();
      dragging = t;
      dragOffX = (e.clientX - panX) / zoom - t.x;
      dragOffY = (e.clientY - panY) / zoom - t.y;
      el.classList.add('dragging');
      el.style.zIndex = 200;
    });

    canvasEl.appendChild(el);
    entityEls[t.name] = el;
  });
}

// ===== SVG LINES =====
function updateLines() {
  const w = 8000, h = 6000;
  svgLines.setAttribute('width', w);
  svgLines.setAttribute('height', h);
  svgLines.style.width = w + 'px';
  svgLines.style.height = h + 'px';

  let html = '';
  relationships.forEach(r => {
    const fromT = tableByName[r.from];
    const toT = tableByName[r.to];
    if (!fromT || !toT) return;
    const fromEl = entityEls[r.from];
    const toEl = entityEls[r.to];
    if (!fromEl || !toEl) return;
    if (fromEl.classList.contains('dimmed') || toEl.classList.contains('dimmed')) return;

    const fromMod = MODULES.find(m => m.key === fromT.module);
    const toMod = MODULES.find(m => m.key === toT.module);

    const x1 = fromT.x + 120;
    const y1 = fromT.y + 60;
    const x2 = toT.x + 120;
    const y2 = toT.y + 60;

    const isHighlighted = selectedTable && (r.from === selectedTable || r.to === selectedTable);
    const color = isHighlighted ? '#818cf8' : (fromMod?.color || '#333');
    const opacity = isHighlighted ? 0.8 : 0.08;
    const width = isHighlighted ? 2 : 1;

    // Curved path
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    const dx = x2 - x1;
    const dy = y2 - y1;
    const cx = mx - dy * 0.15;
    const cy = my + dx * 0.15;

    html += `<path d="M${x1},${y1} Q${cx},${cy} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="${width}" opacity="${opacity}"${isHighlighted ? ' filter="url(#glow)"' : ''}/>`;

    if (isHighlighted) {
      // Arrow at end
      const angle = Math.atan2(y2 - cy, x2 - cx);
      const ax1 = x2 - 8 * Math.cos(angle - 0.4);
      const ay1 = y2 - 8 * Math.sin(angle - 0.4);
      const ax2 = x2 - 8 * Math.cos(angle + 0.4);
      const ay2 = y2 - 8 * Math.sin(angle + 0.4);
      html += `<polygon points="${x2},${y2} ${ax1},${ay1} ${ax2},${ay2}" fill="${color}" opacity="0.8"/>`;
    }
  });

  svgLines.innerHTML = `<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>` + html;
}

// ===== TRANSFORM =====
function applyTransform() {
  canvasEl.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  svgLines.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  zoomInd.textContent = Math.round(zoom * 100) + '%';
}

// ===== SELECTION =====
function selectTable(name) {
  if (selectedTable === name) {
    clearSelection();
    return;
  }
  selectedTable = name;
  const connected = getConnected(name);
  connected.add(name);

  Object.keys(entityEls).forEach(k => {
    const el = entityEls[k];
    if (connected.has(k)) {
      el.classList.remove('dimmed');
      el.classList.add('highlighted');
      const mod = MODULES.find(m => m.key === tableByName[k].module);
      el.style.borderColor = mod ? mod.color + '80' : '#818cf880';
      el.style.boxShadow = `0 0 20px ${mod ? mod.color : '#818cf8'}30`;
    } else {
      el.classList.add('dimmed');
      el.classList.remove('highlighted');
      el.style.borderColor = '';
      el.style.boxShadow = '';
    }
  });

  // Update sidebar
  document.querySelectorAll('.sidebar-table-item').forEach(el => {
    el.classList.toggle('active', el.dataset.table === name);
  });

  updateLines();
  openDetail(name);
}

function clearSelection() {
  selectedTable = null;
  Object.keys(entityEls).forEach(k => {
    const el = entityEls[k];
    el.classList.remove('dimmed', 'highlighted');
    el.style.borderColor = '';
    el.style.boxShadow = '';
  });
  document.querySelectorAll('.sidebar-table-item').forEach(el => el.classList.remove('active'));
  updateLines();
  closeDetail();
}

// ===== DETAIL PANEL =====
function openDetail(name) {
  const t = tableByName[name];
  if (!t) return;
  const mod = MODULES.find(m => m.key === t.module);
  const color = mod?.color || '#666';
  const panel = document.getElementById('detailPanel');

  // All relationships for this table
  const rels = relationships.filter(r => r.from === name || r.to === name);

  let colRows = t.cols.map(c => {
    let tags = '';
    if (c.pk) tags += '<span class="col-tag tag-pk">PK</span>';
    if (c.fk) tags += `<span class="col-tag tag-fk" title="FK → ${c.fk}">FK</span>`;
    if (c.enc) tags += '<span class="col-tag tag-enc">ENC</span>';
    if (c.json) tags += '<span class="col-tag tag-json">JSON</span>';
    return `<div class="detail-col-row">
      <span class="dcol-name">${c.n}</span>
      <span class="dcol-type">${c.t}</span>
      <span class="dcol-tags">${tags}</span>
    </div>`;
  }).join('');

  let relItems = rels.map(r => {
    const isOutgoing = r.from === name;
    const otherName = isOutgoing ? r.to : r.from;
    const otherMod = MODULES.find(m => m.key === tableByName[otherName]?.module);
    const oColor = otherMod?.color || '#666';
    const dir = isOutgoing ? `${r.fromCol} -> ${otherName}.${r.toCol}` : `${r.from}.${r.fromCol} -> ${r.toCol}`;
    return `<div class="detail-rel-item" onclick="selectTable('${otherName}')">
      <span class="dot" style="width:8px;height:8px;border-radius:50%;background:${oColor};flex-shrink:0"></span>
      <span style="font-weight:600;color:#e8ecf4">${otherName}</span>
      <span class="arrow">${isOutgoing ? '&rarr;' : '&larr;'}</span>
      <span style="color:#566a8f;font-size:10px;flex:1;text-align:right">${isOutgoing ? r.fromCol : r.fromCol}</span>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-head">
      <h2 style="color:${color}">${t.name}</h2>
      <span class="mod-label" style="background:${color}20;color:${color};border:1px solid ${color}40">${mod?.label || t.module}</span>
      <div style="margin-top:8px;font-size:11px;color:#566a8f">${t.cols.length} columns &middot; ${rels.length} relationships</div>
    </div>
    <div class="detail-section">
      <h3>Columns (${t.cols.length})</h3>
      ${colRows}
    </div>
    <div class="detail-section">
      <h3>Relationships (${rels.length})</h3>
      ${rels.length ? relItems : '<div style="color:#566a8f;font-size:11px">No direct FK relationships</div>'}
    </div>
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

// ===== FILTER =====
function renderFilters() {
  const bar = document.getElementById('filterBar');
  // All toggle
  let html = `<div class="filter-pill" style="background:rgba(129,140,248,0.15);color:#818cf8;border-color:rgba(129,140,248,0.3)" onclick="toggleAllModules()">All</div>`;
  MODULES.forEach(m => {
    const active = activeModules.has(m.key);
    html += `<div class="filter-pill ${active?'':'inactive'}" data-module="${m.key}"
      style="${active ? `background:${m.color}20;color:${m.color};border-color:${m.color}40` : ''}"
      onclick="toggleModule('${m.key}')">
      <span class="dot" style="background:${m.color}"></span>
      ${m.label} (${m.count})
    </div>`;
  });
  bar.innerHTML = html;
}

function toggleModule(key) {
  if (activeModules.has(key)) activeModules.delete(key);
  else activeModules.add(key);
  applyFilters();
  renderFilters();
}

function toggleAllModules() {
  if (activeModules.size === MODULES.length) {
    activeModules.clear();
  } else {
    MODULES.forEach(m => activeModules.add(m.key));
  }
  applyFilters();
  renderFilters();
}

function applyFilters() {
  TABLES.forEach(t => {
    const el = entityEls[t.name];
    if (!el) return;
    const vis = activeModules.has(t.module);
    el.style.display = vis ? '' : 'none';
  });
  if (selectedTable && !activeModules.has(tableByName[selectedTable]?.module)) {
    clearSelection();
  }
  updateLines();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const scroll = document.getElementById('sidebarScroll');
  let html = '';
  MODULES.forEach(m => {
    const tables = TABLES.filter(t => t.module === m.key);
    const isOpen = sidebarModulesOpen[m.key];
    html += `<div class="sidebar-module">
      <div class="sidebar-module-header" onclick="toggleSidebarModule('${m.key}')">
        <span class="sidebar-module-dot" style="background:${m.color}"></span>
        <span style="flex:1;color:${m.color}">${m.label}</span>
        <span class="sidebar-module-count">${tables.length}</span>
        <span class="sidebar-module-chevron ${isOpen?'open':''}">&#9654;</span>
      </div>
      ${isOpen ? `<div class="sidebar-table-list">${tables.map(t =>
        `<div class="sidebar-table-item${selectedTable===t.name?' active':''}" data-table="${t.name}" onclick="selectTable('${t.name}')">${t.name}</div>`
      ).join('')}</div>` : ''}
    </div>`;
  });
  scroll.innerHTML = html;
}

function toggleSidebarModule(key) {
  sidebarModulesOpen[key] = !sidebarModulesOpen[key];
  renderSidebar();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

// ===== SEARCH =====
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  const inp = document.getElementById('searchInput');
  inp.value = '';
  inp.focus();
  renderSearchResults('');
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
}

function renderSearchResults(query) {
  const res = document.getElementById('searchResults');
  if (!query) {
    res.innerHTML = '<div class="search-empty">Type to search tables and columns...</div>';
    return;
  }
  const q = query.toLowerCase();
  const matches = [];

  TABLES.forEach(t => {
    const mod = MODULES.find(m => m.key === t.module);
    // Match table name
    if (t.name.toLowerCase().includes(q)) {
      matches.push({type:'table', table:t.name, module:mod, score:t.name.toLowerCase().startsWith(q)?2:1});
    }
    // Match column names
    t.cols.forEach(c => {
      if (c.n.toLowerCase().includes(q)) {
        matches.push({type:'column', table:t.name, col:c.n, module:mod, score:0});
      }
    });
  });

  matches.sort((a,b) => b.score - a.score);
  const limited = matches.slice(0, 30);

  if (!limited.length) {
    res.innerHTML = '<div class="search-empty">No results found</div>';
    return;
  }

  res.innerHTML = limited.map(m => {
    const color = m.module?.color || '#666';
    if (m.type === 'table') {
      return `<div class="search-result-item" onclick="closeSearch();selectTable('${m.table}');navigateTo('${m.table}')">
        <span class="sr-dot" style="background:${color}"></span>
        <span class="sr-name">${m.table}</span>
        <span class="sr-meta">${m.module?.label||''}</span>
      </div>`;
    } else {
      return `<div class="search-result-item" onclick="closeSearch();selectTable('${m.table}');navigateTo('${m.table}')">
        <span class="sr-dot" style="background:${color};opacity:0.5"></span>
        <span class="sr-name" style="color:#8b9dc3"><span style="color:#566a8f">${m.table}.</span>${m.col}</span>
        <span class="sr-meta">column</span>
      </div>`;
    }
  }).join('');
}

function navigateTo(tableName) {
  const t = tableByName[tableName];
  if (!t) return;
  // Center on this table
  const wrapRect = canvasWrap.getBoundingClientRect();
  panX = wrapRect.width / 2 - (t.x + 120) * zoom;
  panY = wrapRect.height / 2 - (t.y + 80) * zoom;
  applyTransform();
}

// ===== ZOOM/PAN CONTROLS =====
function fitAll() {
  if (!TABLES.length) return;
  const visible = TABLES.filter(t => activeModules.has(t.module));
  if (!visible.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  visible.forEach(t => {
    minX = Math.min(minX, t.x);
    minY = Math.min(minY, t.y);
    maxX = Math.max(maxX, t.x + 240);
    maxY = Math.max(maxY, t.y + 200);
  });
  const wrapRect = canvasWrap.getBoundingClientRect();
  const pw = wrapRect.width - 40;
  const ph = wrapRect.height - 40;
  const cw = maxX - minX;
  const ch = maxY - minY;
  zoom = Math.min(pw / cw, ph / ch, 1.5);
  zoom = Math.max(0.1, Math.min(zoom, 1.5));
  panX = (pw - cw * zoom) / 2 + 20 - minX * zoom;
  panY = (ph - ch * zoom) / 2 + 20 - minY * zoom;
  applyTransform();
}

function resetView() {
  zoom = 0.55;
  panX = 40;
  panY = 40;
  applyTransform();
  clearSelection();
}

function zoomIn() { zoom = Math.min(zoom * 1.2, 3); applyTransform(); }
function zoomOut() { zoom = Math.max(zoom / 1.2, 0.08); applyTransform(); }

// ===== EVENT HANDLERS =====

// Mouse wheel zoom
canvasWrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldZ = zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.08, Math.min(zoom * delta, 3));
  panX = mx - (mx - panX) * (zoom / oldZ);
  panY = my - (my - panY) * (zoom / oldZ);
  applyTransform();
}, {passive: false});

// Pan with mouse drag on background
canvasWrap.addEventListener('mousedown', (e) => {
  if (e.target === canvasWrap || e.target === canvasEl) {
    panning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
    canvasWrap.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', (e) => {
  if (dragging) {
    const t = dragging;
    t.x = (e.clientX - panX) / zoom - dragOffX;
    t.y = (e.clientY - panY) / zoom - dragOffY;
    const el = entityEls[t.name];
    el.style.left = t.x + 'px';
    el.style.top = t.y + 'px';
    updateLines();
  }
  if (panning) {
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    applyTransform();
  }
});

window.addEventListener('mouseup', (e) => {
  if (dragging) {
    const el = entityEls[dragging.name];
    // Small delay so click handler doesn't fire
    setTimeout(() => el.classList.remove('dragging'), 50);
    el.style.zIndex = '';
    dragging = null;
  }
  if (panning) {
    panning = false;
    canvasWrap.style.cursor = '';
  }
});

// Click background to deselect
canvasWrap.addEventListener('click', (e) => {
  if (e.target === canvasWrap || e.target === canvasEl) {
    clearSelection();
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('searchOverlay').classList.contains('open')) {
      closeSearch();
    } else if (document.getElementById('detailOverlay').classList.contains('open')) {
      closeDetail();
    } else {
      clearSelection();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    fitAll();
  }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    resetView();
  }
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
});

// Search input
document.getElementById('searchInput').addEventListener('input', (e) => {
  renderSearchResults(e.target.value);
});

// ===== INIT =====
renderEntities();
renderFilters();
renderSidebar();
applyTransform();
updateLines();

// Initial fit after a tick
setTimeout(fitAll, 100);
</script>
</body>
</html>
