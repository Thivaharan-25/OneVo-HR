# =============================================================================
# Cross-Repo Brain Sync Workflow
# =============================================================================
#
# PURPOSE: Automatically update the brain repo when PRs are merged in the
#          code repo. This keeps the brain aware of code changes without
#          relying on developers to manually update documentation.
#
# SETUP:
#   1. Copy this file to your CODE repo: .github/workflows/brain-sync.yml
#   2. Replace [YOUR_ORG/YOUR_PROJECT-brain] with your brain repo path
#   3. Create a GitHub PAT with 'repo' scope (or fine-grained with write access)
#   4. Add the PAT as a secret named BRAIN_REPO_PAT in your code repo
#
# =============================================================================

name: Sync to Brain Repo

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync-brain:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout brain repo
        uses: actions/checkout@v4
        with:
          repository: '[YOUR_ORG/YOUR_PROJECT-brain]'
          token: ${{ secrets.BRAIN_REPO_PAT }}
          path: brain

      - name: Update brain changelog
        run: |
          cd brain

          DATE=$(date +%Y-%m-%d)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'

          # Create a new changelog entry file (matches directory-based changelog structure)
          CHANGELOG_FILE="AI_CONTEXT/changelog/${DATE}-pr-${PR_NUMBER}.md"

          cat > "$CHANGELOG_FILE" << EOF
          # ${DATE} - Code PR #${PR_NUMBER}: ${PR_TITLE}

          - **PR:** [#${PR_NUMBER} ${PR_TITLE}](${PR_URL})
          - **Author:** ${PR_AUTHOR}
          - **Merged:** ${DATE}
          EOF

          # Add label-based flags
          if echo "$PR_LABELS" | grep -qi "breaking-change"; then
            echo "- **WARNING:** This PR contains breaking changes. Review relevant docs." >> "$CHANGELOG_FILE"
          fi
          if echo "$PR_LABELS" | grep -qi "new-api"; then
            echo "- **ACTION:** New API endpoint(s) added. Update \`architecture/api-conventions.md\`." >> "$CHANGELOG_FILE"
          fi
          if echo "$PR_LABELS" | grep -qi "schema-change"; then
            echo "- **ACTION:** Database schema changed. Update \`cross-cutting/database/README.md\`." >> "$CHANGELOG_FILE"
          fi
          if echo "$PR_LABELS" | grep -qi "new-dependency"; then
            echo "- **ACTION:** Dependencies changed. Update \`AI_CONTEXT/tech-stack.md\`." >> "$CHANGELOG_FILE"
          fi

      - name: Flag breaking changes in known issues
        if: contains(toJson(github.event.pull_request.labels.*.name), 'breaking-change')
        run: |
          cd brain

          DATE=$(date +%Y-%m-%d)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          # Append breaking change warning to known-issues
          echo "" >> AI_CONTEXT/known-issues.md
          echo "### PR-${PR_NUMBER}: Breaking Change (${DATE})" >> AI_CONTEXT/known-issues.md
          echo "- **What:** ${PR_TITLE}" >> AI_CONTEXT/known-issues.md
          echo "- **Impact:** Review and update relevant docs — [PR #${PR_NUMBER}](${PR_URL})" >> AI_CONTEXT/known-issues.md
          echo "- **Severity:** High" >> AI_CONTEXT/known-issues.md

      - name: Commit and push to brain
        run: |
          cd brain
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "chore(sync): auto-update from code repo PR #${{ github.event.pull_request.number }}" && git push)
